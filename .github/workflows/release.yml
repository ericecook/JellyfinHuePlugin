name: Release Plugin

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build plugin
        run: dotnet publish JellyfinHuePlugin/JellyfinHuePlugin.csproj -c Release -o ./output

      - name: Get version from build.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' build.yaml | sed 's/version: *"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package plugin
        run: |
          cd output
          zip -r "../JellyfinHuePlugin_${{ steps.version.outputs.version }}.zip" ./*

      - name: Generate checksum
        run: |
          md5sum "JellyfinHuePlugin_${{ steps.version.outputs.version }}.zip" > "JellyfinHuePlugin_${{ steps.version.outputs.version }}.md5"

      - name: Upload release assets
        if: github.event_name == 'release'
        uses: shogo82148/actions-upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: |
            JellyfinHuePlugin_${{ steps.version.outputs.version }}.zip
            JellyfinHuePlugin_${{ steps.version.outputs.version }}.md5

  update-manifest:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate manifest and publish to gh-pages
        uses: Kevinjil/jellyfin-plugin-repo-action@v0.4.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
